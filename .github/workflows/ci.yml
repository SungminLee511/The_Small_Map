name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: smallmap
          POSTGRES_PASSWORD: smallmap
          POSTGRES_DB: smallmap
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://smallmap:smallmap@localhost:5432/smallmap
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://smallmap:smallmap@localhost:5432/smallmap
        run: pytest tests/ -v

      - name: Lint
        run: ruff check .

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check & build
        run: pnpm build

      - name: Run tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Install e2e deps
        working-directory: e2e
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        working-directory: e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Start frontend (preview)
        working-directory: frontend
        run: pnpm preview --host 127.0.0.1 --port 5173 &
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "frontend did not come up" && exit 1

      - name: Run Playwright tests
        working-directory: e2e
        env:
          FRONTEND_URL: http://127.0.0.1:5173
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
