version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: smallmap
      POSTGRES_PASSWORD: smallmap
      POSTGRES_DB: smallmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smallmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://smallmap:smallmap@db:5432/smallmap
      APP_ENV: development
      FRONTEND_BASE_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        pip install -e '.[dev]' &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - ./backend:/app
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_KAKAO_MAPS_JS_KEY: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: pnpm dev --host 0.0.0.0

volumes:
  pgdata:
